name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

env:
  OBSIDIAN_VERSION: "1.12.7"
  NODE_VERSION: 22

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Install Obsidian
        run: |
          sudo apt update
          sudo apt install flatpak dbus-x11 xvfb
          flatpak remote-add --user flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub md.obsidian.Obsidian

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Verify release version metadata
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          package_version="$(node -p "require('./package.json').version")"
          manifest_version="$(node -p "require('./manifest.json').version")"
          versions_min_app="$(node -p "require('./versions.json')[require('./package.json').version] || ''")"

          if [ "$tag" != "$package_version" ]; then
            echo "Tag ($tag) must match package.json version ($package_version)."
            exit 1
          fi

          if [ "$manifest_version" != "$package_version" ]; then
            echo "manifest.json version ($manifest_version) must match package.json version ($package_version)."
            exit 1
          fi

          if [ -z "$versions_min_app" ]; then
            echo "versions.json must include an entry for $package_version."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: |
          npm run build-with-tests
          Xvfb -ac :0 -screen 0 1280x1024x16 &
          export DISPLAY=:0
          export $(dbus-launch)
          npm test

      - name: Build plugin
        run: npm run build

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"

          gh release create "$tag" \
            --verify-tag \
            --title="$tag" \
            dist/main.js#main.js \
            manifest.json \
            styles.css
